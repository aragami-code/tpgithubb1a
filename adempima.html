<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 20px;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 1rem;
        }

        p {
            color: #34495e;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .welcome-button {
            background: #4ecdc4;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .welcome-button:hover {
            transform: translateY(-3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-box {
            animation: fadeIn 1s ease-out;
        }
    </style>
</head>
<body>
    <div class="welcome-box">
        <h1>🌟 Bienvenue sur le site d'Adempima ! 🌟</h1>
        <p>Nous sommes ravis de vous accueillir parmi nous.<br>
        Découvrez un univers de possibilités et de contenus passionnants.</p>
        <button class="welcome-button">Commencer l'exploration</button>
    </div>
</body>
</html>
